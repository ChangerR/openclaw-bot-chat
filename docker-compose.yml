version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_DB: ${DATABASE_DBNAME:-openclaw_bot_chat}
    ports:
      - "${POSTGRES_PORT_MAPPING:-5432:5432}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT_MAPPING:-6379:6379}"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    expose:
      - "1883"
      - "9001"
    environment:
      MQTT_USERNAME: ${MQTT_USERNAME:-openclaw_backend}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-change-me-in-production}
    command:
      - /bin/sh
      - -c
      - |
        mosquitto_passwd -b -c /mosquitto/config/passwd "$$MQTT_USERNAME" "$$MQTT_PASSWORD"
        chown mosquitto:mosquitto /mosquitto/config/passwd
        chmod 600 /mosquitto/config/passwd
        exec mosquitto -c /mosquitto/config/mosquitto.conf
    volumes:
      - ./backend/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./backend/mosquitto.acl:/mosquitto/config/aclfile
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -u \"$${MQTT_USERNAME}\" -P \"$${MQTT_PASSWORD}\" -t healthcheck/ping -m ok -q 0"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT_MAPPING:-8080:8080}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    volumes:
      - ./backend/config.yaml:/app/config.yaml
    environment:
      - TZ=Asia/Shanghai
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=${DATABASE_USER:-postgres}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-postgres}
      - DATABASE_DBNAME=${DATABASE_DBNAME:-openclaw_bot_chat}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MQTT_BROKER=tcp://mosquitto:1883
      - MQTT_USERNAME=${MQTT_USERNAME:-openclaw_backend}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-change-me-in-production}
      - MQTT_TOPIC_PREFIX=${MQTT_TOPIC_PREFIX:-chat}
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      - APP_MODE=${APP_MODE:-release}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health | grep -q '\"status\":\"ok\"'"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
        NEXT_PUBLIC_API_WS_HOST: ${NEXT_PUBLIC_API_WS_HOST:-}
    ports:
      - "${FRONTEND_PORT_MAPPING:-3000:3000}"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - TZ=Asia/Shanghai
      - NODE_ENV=production

volumes:
  postgres_data:
  redis_data:
