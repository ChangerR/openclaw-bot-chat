services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_DB: ${DATABASE_DBNAME:-openclaw_bot_chat}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT_MAPPING:-6379:6379}"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  emqx:
    image: emqx/emqx:5.8.5
    ports:
      - "${MQTT_TCP_PORT_MAPPING:-1883:1883}"
      - "${MQTT_WS_PORT_MAPPING:-8083:8083}"
      - "${EMQX_DASHBOARD_PORT_MAPPING:-18083:18083}"
    environment:
      EMQX_NODE__NAME: emqx@127.0.0.1
      EMQX_LOG__CONSOLE_HANDLER__LEVEL: warning
      EMQX_DASHBOARD__DEFAULT_USERNAME: ${EMQX_DASHBOARD_USERNAME:-admin}
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_DASHBOARD_PASSWORD:-public}
      MQTT_USERNAME: ${MQTT_USERNAME:-openclaw_backend}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-change-me-in-production}
    command:
      - /bin/sh
      - -c
      - |
        printf 'user_id,password,is_superuser\n%s,%s,false\n' "$$MQTT_USERNAME" "$$MQTT_PASSWORD" > /opt/emqx/etc/auth-built-in-db-bootstrap.csv
        exec /opt/emqx/bin/emqx foreground
    volumes:
      - ./broker/emqx/emqx.conf:/opt/emqx/etc/emqx.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "/opt/emqx/bin/emqx ctl status | grep -q 'is started'"]
      interval: 10s
      timeout: 5s
      retries: 3

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT_MAPPING:-9000:9000}"
      - "${MINIO_CONSOLE_PORT_MAPPING:-9001:9001}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      STORAGE_S3_BUCKET: ${STORAGE_S3_BUCKET:-openclaw-assets}
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do
          echo "waiting for minio..."
          sleep 2
        done
        mc mb -p "local/$$STORAGE_S3_BUCKET"

  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT_MAPPING:-8080:8080}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      emqx:
        condition: service_healthy
    volumes:
      - ./backend/config.yaml:/app/config.yaml
    environment:
      - TZ=Asia/Shanghai
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=${DATABASE_USER:-postgres}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-postgres}
      - DATABASE_DBNAME=${DATABASE_DBNAME:-openclaw_bot_chat}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MQTT_BROKER=tcp://emqx:1883
      - MQTT_USERNAME=${MQTT_USERNAME:-openclaw_backend}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-change-me-in-production}
      - MQTT_TOPIC_PREFIX=${MQTT_TOPIC_PREFIX:-chat}
      - MQTT_TCP_PUBLIC_URL=${MQTT_TCP_PUBLIC_URL:-mqtt://127.0.0.1:1883}
      - MQTT_WS_PUBLIC_URL=${MQTT_WS_PUBLIC_URL:-ws://127.0.0.1:8083/mqtt}
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      - APP_MODE=${APP_MODE:-release}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - STORAGE_PROVIDER=${STORAGE_PROVIDER:-s3}
      - STORAGE_BUCKET=${STORAGE_BUCKET:-}
      - STORAGE_REGION=${STORAGE_REGION:-}
      - STORAGE_ENDPOINT=${STORAGE_ENDPOINT:-}
      - STORAGE_PUBLIC_BASE_URL=${STORAGE_PUBLIC_BASE_URL:-}
      - STORAGE_PRIVATE_READ=${STORAGE_PRIVATE_READ:-true}
      - STORAGE_UPLOAD_URL_TTL=${STORAGE_UPLOAD_URL_TTL:-900}
      - STORAGE_DOWNLOAD_URL_TTL=${STORAGE_DOWNLOAD_URL_TTL:-900}
      - STORAGE_KEY_PREFIX=${STORAGE_KEY_PREFIX:-chat-assets}
      - STORAGE_COS_SECRET_ID=${STORAGE_COS_SECRET_ID:-}
      - STORAGE_COS_SECRET_KEY=${STORAGE_COS_SECRET_KEY:-}
      - STORAGE_COS_SESSION_TOKEN=${STORAGE_COS_SESSION_TOKEN:-}
      - STORAGE_OSS_ACCESS_KEY_ID=${STORAGE_OSS_ACCESS_KEY_ID:-}
      - STORAGE_OSS_ACCESS_KEY_SECRET=${STORAGE_OSS_ACCESS_KEY_SECRET:-}
      - STORAGE_OSS_SECURITY_TOKEN=${STORAGE_OSS_SECURITY_TOKEN:-}
      - STORAGE_S3_ENDPOINT=${STORAGE_S3_ENDPOINT:-minio:9000}
      - STORAGE_S3_PUBLIC_ENDPOINT=${STORAGE_S3_PUBLIC_ENDPOINT:-http://127.0.0.1:9000}
      - STORAGE_S3_REGION=${STORAGE_S3_REGION:-us-east-1}
      - STORAGE_S3_BUCKET=${STORAGE_S3_BUCKET:-openclaw-assets}
      - STORAGE_S3_ACCESS_KEY=${STORAGE_S3_ACCESS_KEY:-minioadmin}
      - STORAGE_S3_SECRET_KEY=${STORAGE_S3_SECRET_KEY:-minioadmin}
      - STORAGE_S3_SSL=${STORAGE_S3_SSL:-false}
      - ASSET_MAX_IMAGE_SIZE_MB=${ASSET_MAX_IMAGE_SIZE_MB:-10}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health | grep -q '\"status\":\"ok\"'"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    ports:
      - "${FRONTEND_PORT_MAPPING:-3000:3000}"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - TZ=Asia/Shanghai
      - NODE_ENV=production

volumes:
  postgres_data:
  redis_data:
  minio_data:
