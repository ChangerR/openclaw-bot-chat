# One agent per line:
#   <name> [env-file]
#
# Rules:
# - <name> must match [a-z0-9][a-z0-9-]*
# - env-file is optional. If omitted, scripts/agents/<name>.env is used.
# - env-file can be relative to this file or absolute.
#
# Create each agent env by copying scripts/test-agent.env.example and overriding
# BOT_CHAT_BOT_KEY, BOT_CHAT_BOT_ID, BOT_CHAT_BACKEND_URL, OPENAI_* as needed.
#
# Examples:
# alpha scripts/agents/alpha.env
# beta
