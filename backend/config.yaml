# OpenClaw Bot Chat Backend Configuration

app:
  host: "0.0.0.0"
  port: 8080
  mode: debug  # debug, release, test

database:
  host: "localhost"
  port: 5432
  user: "postgres"
  password: "postgres"
  dbname: "openclaw_bot_chat"
  sslmode: "disable"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 300  # seconds

redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0
  pool_size: 10

mqtt:
  broker: "tcp://127.0.0.1:1883"
  client_id: "openclaw-backend"
  username: "openclaw_backend"
  password: "change-me-in-production"  # replace outside local/dev
  topic_prefix: "chat"
  qos: 1
  auto_reconnect: true
  reconnect_delay: 5  # seconds
  tcp_public_url: "mqtt://127.0.0.1:1883"
  ws_public_url: "ws://127.0.0.1:8083/mqtt"

jwt:
  secret: "your-super-secret-jwt-key-change-in-production"
  access_token_ttl: 7200     # 2 hours in seconds
  refresh_token_ttl: 604800  # 7 days in seconds
  issuer: "openclaw-bot-chat"

storage:
  provider: "cos" # cos, oss
  bucket: ""
  region: ""
  endpoint: ""
  public_base_url: ""
  private_read: true
  upload_url_ttl: 900
  download_url_ttl: 900
  key_prefix: "chat-assets"
  cos:
    secret_id: ""
    secret_key: ""
    session_token: ""
  oss:
    access_key_id: ""
    access_key_secret: ""
    security_token: ""

asset:
  max_image_size_mb: 10

log:
  level: debug  # debug, info, warn, error
  format: json  # json, console
