version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: openclaw_bot_chat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    expose:
      - "1883"
      - "9001"
    environment:
      MQTT_USERNAME: openclaw_backend
      MQTT_PASSWORD: change-me-in-production
    command:
      - /bin/sh
      - -c
      - |
        mosquitto_passwd -b -c /mosquitto/config/passwd "$$MQTT_USERNAME" "$$MQTT_PASSWORD"
        exec mosquitto -c /mosquitto/config/mosquitto.conf
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto.acl:/mosquitto/config/aclfile
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-u", "$$MQTT_USERNAME", "-P", "$$MQTT_PASSWORD", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    volumes:
      - ./config.yaml:/app/config.yaml
    environment:
      - TZ=Asia/Shanghai
      - DATABASE_HOST=postgres
      - REDIS_HOST=redis
      - MQTT_BROKER=tcp://mosquitto:1883
      - MQTT_USERNAME=openclaw_backend
      - MQTT_PASSWORD=change-me-in-production

volumes:
  postgres_data:
  redis_data:
