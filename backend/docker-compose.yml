version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: openclaw_bot_chat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    expose:
      - "1883"
      - "9001"
    environment:
      MQTT_USERNAME: openclaw_backend
      MQTT_PASSWORD: change-me-in-production
    command:
      - /bin/sh
      - -c
      - |
        mosquitto_passwd -b -c /mosquitto/config/passwd "$$MQTT_USERNAME" "$$MQTT_PASSWORD"
        chown mosquitto:mosquitto /mosquitto/config/passwd
        chmod 600 /mosquitto/config/passwd
        exec mosquitto -c /mosquitto/config/mosquitto.conf
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto.acl:/mosquitto/config/aclfile
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -u \"$${MQTT_USERNAME}\" -P \"$${MQTT_PASSWORD}\" -t healthcheck/ping -m ok -q 0"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    volumes:
      - ./config.yaml:/app/config.yaml
    environment:
      - TZ=Asia/Shanghai
      - DATABASE_HOST=postgres
      - REDIS_HOST=redis
      - MQTT_BROKER=tcp://mosquitto:1883
      - MQTT_USERNAME=openclaw_backend
      - MQTT_PASSWORD=change-me-in-production
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health | grep -q '\"status\":\"ok\"'"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
        VITE_MQTT_BROKER_URL: ""
    ports:
      - "4173:4173"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - TZ=Asia/Shanghai

volumes:
  postgres_data:
  redis_data:
