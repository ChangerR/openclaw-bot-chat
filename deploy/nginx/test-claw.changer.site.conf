# OpenClaw Bot Chat
# Nginx site config for test-claw.changer.site
#
# Assumptions:
# - Frontend server listens on:
#   127.0.0.1:4173
#   This matches scripts/docker-up.sh.
# - Backend listens on:
#   127.0.0.1:8080
# - Nginx is the public entrypoint for both frontend and backend

upstream openclaw_frontend {
    server 127.0.0.1:4173;
    keepalive 16;
}

upstream openclaw_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

upstream openclaw_broker_ws {
    server 127.0.0.1:8083;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name test-claw.changer.site;

    client_max_body_size 20m;

    access_log /var/log/nginx/test-claw.changer.site.access.log;
    error_log  /var/log/nginx/test-claw.changer.site.error.log warn;

    location = /health {
        proxy_pass http://openclaw_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://openclaw_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location /mqtt {
        proxy_pass http://openclaw_broker_ws/mqtt;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
    }

    location /_next/webpack-hmr {
        proxy_pass http://openclaw_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://openclaw_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }
}
