# OpenClaw Bot Chat
# Nginx site config for clawchat.changer.site
#
# Docker publishes the app services on loopback:
# - frontend: 127.0.0.1:3000
# - backend:  127.0.0.1:8080
# - MQTT WS:  127.0.0.1:8083/mqtt

upstream openclaw_frontend {
    server 127.0.0.1:3000;
    keepalive 16;
}

upstream openclaw_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

upstream openclaw_broker_ws {
    server 127.0.0.1:8083;
    keepalive 16;
}

upstream openclaw_minio {
    server 127.0.0.1:9000;
    keepalive 16;
}

server {
    server_name clawchat.changer.site;

    client_max_body_size 20m;

    access_log /var/log/nginx/clawchat.changer.site.access.log;
    error_log  /var/log/nginx/clawchat.changer.site.error.log warn;

    location = /health {
        proxy_pass http://openclaw_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://openclaw_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location /openclaw-assets/ {
        proxy_pass http://openclaw_minio;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /mqtt {
        proxy_pass http://openclaw_broker_ws/mqtt;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }

    location /_next/webpack-hmr {
        proxy_pass http://openclaw_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://openclaw_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/clawchat.changer.site/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/clawchat.changer.site/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = clawchat.changer.site) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name clawchat.changer.site;
    return 404; # managed by Certbot
}
